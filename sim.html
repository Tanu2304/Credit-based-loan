<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Validation</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .approved {
            color: green;
        }

        .rejected {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loan Validation</h2>

    <input type="number" id="income" placeholder="Monthly Income (₹)">
    <input type="number" id="loan" placeholder="Loan Amount (₹)">
    <input type="number" id="age" placeholder="Age">

    <button onclick="validateLoan()">Check Eligibility</button>

    <div id="result" class="result"></div>
</div>

<script>
function validateLoan() {
    let income = document.getElementById("income").value;
    let loan = document.getElementById("loan").value;
    let age = document.getElementById("age").value;
    let result = document.getElementById("result");

    if (!income || !loan || !age) {
        result.innerHTML = "⚠️ Please fill all fields";
        result.className = "result rejected";
        return;
    }

    // Simple validation logic
    if (age >= 18 && age <= 60 && income >= 5000 && loan <= income * 10) {
        result.innerHTML = "✅ Loan Approved!";
        result.className = "result approved";
    } else {
        result.innerHTML = "❌ Loan Rejected";
        result.className = "result rejected";
    }
}
</script>

</body>
</html>
