<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Loan Validator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #c33764;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #a52a52;
}

.result {
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
}

.approved { background: #e6fffa; color: green; }
.rejected { background: #ffe6e6; color: red; }

.emi-box {
    margin-top: 10px;
    background: #f0f8ff;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Loan Validator + EMI</h2>

    <input type="number" id="credit" placeholder="Credit Score (300–900)">
    <input type="number" id="age" placeholder="Age (18–70)">
    <input type="number" id="income" placeholder="Monthly Income (₹)">
    <input type="number" id="loan" placeholder="Loan Amount (₹)">
    <input type="number" step="0.01" id="dti" placeholder="DTI Ratio (0.01–1.0)">
    
    <select id="term">
        <option value="">Select Loan Term</option>
        <option value="12">12 Months</option>
        <option value="24">24 Months</option>
        <option value="36">36 Months</option>
        <option value="60">60 Months</option>
    </select>

    <input type="number" id="rate" placeholder="Interest Rate (%)">

    <button onclick="validateLoan()">Validate & Calculate EMI</button>

    <div id="result" class="result"></div>
    <div id="emi" class="emi-box"></div>
</div>

<script>
function validateLoan() {
    let credit = parseInt(document.getElementById("credit").value);
    let age = parseInt(document.getElementById("age").value);
    let income = parseFloat(document.getElementById("income").value);
    let loan = parseFloat(document.getElementById("loan").value);
    let dti = parseFloat(document.getElementById("dti").value);
    let term = document.getElementById("term").value;
    let rate = parseFloat(document.getElementById("rate").value);

    let result = document.getElementById("result");
    let emiBox = document.getElementById("emi");

    // Validation checks
    if (
        credit < 300 || credit > 900 ||
        age < 18 || age > 70 ||
        dti < 0.01 || dti > 1.0 ||
        loan <= 0 ||
        income <= 0 ||
        term === "" ||
        isNaN(rate)
    ) {
        result.innerHTML = "❌ Invalid Inputs! Please check all conditions.";
        result.className = "result rejected";
        emiBox.innerHTML = "";
        return;
    }

    // Decision logic
    if (credit >= 700 && dti <= 0.4) {
        result.innerHTML = "✅ Loan Approved";
        result.className = "result approved";
    } else {
        result.innerHTML = "❌ Loan Rejected (Risk too high)";
        result.className = "result rejected";
        emiBox.innerHTML = "";
        return;
    }

    // EMI Calculation
    let P = loan;
    let r = rate / 12 / 100;
    let n = parseInt(term);

    let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

    emiBox.innerHTML = `
        💰 Monthly EMI: ₹${emi.toFixed(2)} <br>
        📊 Total Payment: ₹${(emi * n).toFixed(2)} <br>
        📉 Interest Paid: ₹${((emi * n) - P).toFixed(2)}
    `;
}
</script>
<script>
// Reset result when user edits anything
let inputs = document.querySelectorAll("input, select");

inputs.forEach(input => {
    input.addEventListener("input", () => {
        document.getElementById("result").innerHTML = "";
        document.getElementById("emi").innerHTML = "";
    });
});
</script>


</body>
</html>
